# Modified by Kennedy Umege for Codex-Claude Bridge, 2026.
name: Pull Request CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.18.0
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full check
        run: npm run check

      - name: Verify package contents
        run: npm run pack:check

  windows-test:
    name: Windows Node 18.18.0
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 18.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository validation
        run: npm run lint

      - name: Run Windows portability smoke suite
        run: npm run test:windows

      - name: Verify package contents
        run: npm run pack:check

  macos-tmux:
    name: macOS tmux integration
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: brew install tmux

      - name: Install dependencies
        run: npm ci

      - name: Run real tmux integration
        run: node --test test/tmux-executor.test.mjs
