name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run full check
        run: npm run check

      - name: Verify package contents
        run: npm run pack:check

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' && env.NPM_PUBLISH_ENABLED == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Skip npm publish
        if: ${{ env.NPM_TOKEN == '' || env.NPM_PUBLISH_ENABLED != 'true' }}
        run: echo "Package is private by default; set NPM_PUBLISH_ENABLED=true and NPM_TOKEN to publish."
